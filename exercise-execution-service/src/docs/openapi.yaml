openapi: 3.0.3
info:
  title: Exercise Execution Service API
  description: |
    API REST para registro de execuções de exercícios físicos.

    ## Autenticação
    Rotas protegidas exigem um token JWT no header `Authorization: Bearer <token>`.
    Obtenha o token via `POST /auth/login`.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor local de desenvolvimento

tags:
  - name: Auth
    description: Registro e autenticação de usuários
  - name: Exercises
    description: Catálogo de exercícios (somente leitura)
  - name: Executions
    description: Registro de execuções de exercícios (CRUD, requer autenticação)
  - name: Users
    description: Dados do usuário autenticado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice
        createdAt:
          type: string
          format: date-time
          example: '2026-04-21T11:50:10.046Z'

    Exercise:
      type: object
      properties:
        id:
          type: integer
          example: 1
        slug:
          type: string
          example: pushup
        name:
          type: string
          example: Flexão
        description:
          type: string
          example: Apoie as mãos no chão na largura dos ombros...
        createdAt:
          type: string
          format: date-time

    Execution:
      type: object
      properties:
        id:
          type: integer
          example: 11
        userId:
          type: integer
          example: 1
        exerciseId:
          type: integer
          example: 1
        reps:
          type: integer
          example: 15
        durationSec:
          type: integer
          example: 45
        result:
          type: string
          enum: [correct, incorrect]
          example: correct
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.92
        executedAt:
          type: string
          format: date-time
          example: '2026-04-21T12:00:00.000Z'
        createdAt:
          type: string
          format: date-time
        exercise:
          $ref: '#/components/schemas/Exercise'

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
            details:
              type: object

paths:
  /health:
    get:
      summary: Health check
      tags: [Auth]
      responses:
        '200':
          description: Servidor no ar
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      summary: Cria conta de usuário
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  example: novo@example.com
                password:
                  type: string
                  minLength: 6
                  example: 'senha123'
                name:
                  type: string
                  example: Novo Usuário
      responses:
        '201':
          description: Usuário criado com sucesso
          headers:
            Location:
              schema:
                type: string
              example: /me
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email já cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      summary: Autentica e retorna JWT
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  example: 'senha123'
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /me:
    get:
      summary: Dados do usuário autenticado
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /exercises:
    get:
      summary: Lista exercícios do catálogo
      tags: [Exercises]
      responses:
        '200':
          description: Lista de exercícios
          content:
            application/json:
              schema:
                type: object
                properties:
                  exercises:
                    type: array
                    items:
                      $ref: '#/components/schemas/Exercise'

  /exercises/{id}:
    get:
      summary: Detalha um exercício
      tags: [Exercises]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Exercício encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  exercise:
                    $ref: '#/components/schemas/Exercise'
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Exercício não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions:
    get:
      summary: Lista execuções do usuário autenticado
      tags: [Executions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de execuções
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Execution'
        '401':
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Registra nova execução de exercício
      tags: [Executions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [exerciseId, reps, durationSec, result, score, executedAt]
              properties:
                exerciseId:
                  type: integer
                  example: 1
                reps:
                  type: integer
                  example: 15
                durationSec:
                  type: integer
                  example: 45
                result:
                  type: string
                  enum: [correct, incorrect]
                  example: correct
                score:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  example: 0.92
                executedAt:
                  type: string
                  format: date-time
                  example: '2026-04-21T12:00:00Z'
      responses:
        '201':
          description: Execução criada
          headers:
            Location:
              schema:
                type: string
              example: /executions/11
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution:
                    $ref: '#/components/schemas/Execution'
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Exercício não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions/{id}:
    get:
      summary: Detalha execução do usuário autenticado
      tags: [Executions]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Execução encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution:
                    $ref: '#/components/schemas/Execution'
        '401':
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Execução não encontrada (ou pertence a outro usuário)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Atualiza execução do usuário autenticado
      tags: [Executions]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reps:
                  type: integer
                  example: 20
                durationSec:
                  type: integer
                  example: 60
                result:
                  type: string
                  enum: [correct, incorrect]
                score:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  example: 0.95
                executedAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Execução atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution:
                    $ref: '#/components/schemas/Execution'
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Execução não encontrada (ou pertence a outro usuário)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Remove execução do usuário autenticado
      tags: [Executions]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Execução removida (sem corpo)
        '401':
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Execução não encontrada (ou pertence a outro usuário)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
